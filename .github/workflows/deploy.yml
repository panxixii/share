name: CI/CD Build & Auto-Deploy to Cloud Run

on:
  push:
    branches:
      - main
      - master

env:
  # Replace these with your Google Cloud configuration
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-east1                             # e.g., us-central1 or us-east1
  SERVICE_NAME: zhijiang-footprints-app        # Name of your Cloud Run service
  GAR_LOCATION: us-east1-docker.pkg.dev        # Artifact Registry location

jobs:
  deploy:
    name: Build & Deploy Container to Cloud Run
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write                          # Required for Workload Identity Federation if used

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      # Setup Node.JS for auditing/linting steps prior to dockerization (Optional but highly recommended)
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Audit Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run Linter Checks
        run: npm run lint

      # Authentication with Google Cloud
      # Supports either Workload Identity Federation (recommended) or Service Account Key JSON
      - name: Authenticate with Google Cloud
        id: auth
        if: ${{ secrets.GCP_SA_KEY != '' }}
        uses: google-github-actions/auth@v2
        with:
          # Configuration for Service Account Key Secret (e.g. GCP_SA_KEY)
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Configure Docker auth helper of gcloud to build and push safely
      - name: Configure Docker/gcloud Authentication
        if: ${{ secrets.GCP_SA_KEY != '' }}
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }} --quiet

      # Build the Docker image and push to Artifact Registry with unique commit SHA tagging
      - name: Build and Push Docker Container Image
        if: ${{ secrets.GCP_SA_KEY != '' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}/app:${{ github.sha }}
            ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}/app:latest

      # Deploy the image to Google Cloud Run
      - name: Deploy Container Service to Cloud Run
        id: deploy-to-cloudrun
        if: ${{ secrets.GCP_SA_KEY != '' }}
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}/app:${{ github.sha }}
          # Inject platform parameters. Cloud Run overrides port and maps ingress traffic automatically
          flags: |
            --port=3000
            --allow-unauthenticated
          # Safe mapping of your critical secret environment parameters (e.g. Google Gemini API)
          env_vars: |
            NODE_ENV=production
          secrets: |
            GEMINI_API_KEY=GEMINI_API_KEY:latest

      # Output the live deployed URL for development audit
      - name: Show Live Deployment Access URL
        if: ${{ secrets.GCP_SA_KEY != '' }}
        run: |
          echo "🚀 Deployment successful!"
          echo "🔗 Services are live at: ${{ steps.deploy-to-cloudrun.outputs.url }}"
